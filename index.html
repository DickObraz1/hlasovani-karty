<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlasování o nových kartách | Dickobraz</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #fbda18; --black: #000000; --white: #ffffff; --dark-grey: #444; --error: #ff4444; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: var(--black); color: var(--white); -webkit-font-smoothing: antialiased; }
        
        h1 { text-align: center; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-weight: 900; }
        
        .user-info-section { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--yellow); margin-bottom: 30px; }
        .hidden { display: none; }
        .user-welcome { margin-bottom: 20px; font-size: 1.1rem; }

        .add-suggestion { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 3px dashed var(--yellow); margin-bottom: 40px; position: relative; }
        
        .promo-box { background: var(--yellow); color: var(--black); padding: 20px; border-radius: 15px; margin-bottom: 25px; text-align: center; border: 3px solid var(--white); }
        .promo-box h4 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; }
        .promo-box p { margin: 0; font-weight: bold; font-size: 0.95rem; line-height: 1.4; }

        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; padding-top: 10px; border-top: 1px solid #333; }
        .filter-group button { background: #333; color: white; border: 1px solid var(--yellow); padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .filter-group button.active { background: var(--yellow); color: var(--black); }
        .sort-group select { background: #333; color: white; border: 1px solid var(--yellow); padding: 8px; border-radius: 5px; cursor: pointer; }

        #cardsList { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .card { 
            aspect-ratio: 2.5/3.5; padding: 20px; border-radius: 14px; display: flex; flex-direction: column; 
            justify-content: flex-start; color: var(--black); box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            position: relative; border: 4px solid transparent; box-sizing: border-box; transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card-highlight { border: 5px solid #00ff00 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(0, 255, 0, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 0, 0); } 100% { box-shadow: 0 0 0 0px rgba(0, 255, 0, 0); } }

        .card-otázka { background: var(--yellow); border-color: var(--black); }
        .card-odpověď { background: var(--white); border-color: var(--yellow); }
        
        .card h3 { margin: 0; font-size: 1.3rem; line-height: 1.25; text-align: left; font-weight: bold; word-wrap: break-word; padding-top: 10px; }
        
        .vote-count { position: absolute; top: 12px; right: 15px; font-size: 0.7rem; font-weight: 900; opacity: 0.6; }
        .report-btn { position: absolute; top: 12px; left: 15px; font-size: 0.8rem; cursor: pointer; opacity: 0.3; transition: 0.2s; border: none; background: none; padding: 0; }
        .report-btn:hover { opacity: 1; transform: scale(1.2); }
        
        .card-footer { margin-top: auto; padding-top: 15px; text-align: center; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-vote { flex: 4; background: var(--black); color: var(--white); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-vote:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-voted { background: rgba(0,0,0,0.1) !important; color: var(--black) !important; border: 3px solid var(--black) !important; cursor: default; flex: 5; }
        .btn-share { flex: 1; background: transparent; border: 2px solid var(--black); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .card-otázka .btn-vote { color: var(--yellow); }
        .card-odpověď .btn-vote { background: var(--yellow); color: var(--black); }

        .brand-subtext { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 900; display: block; opacity: 0.8; }
        
        input, select, button.submit-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        .submit-btn { background: var(--yellow); color: var(--black); font-weight: bold; text-transform: uppercase; cursor: pointer; border: 2px solid var(--black); }
        .submit-btn:disabled { background: #555; cursor: not-allowed; border-color: #333; }

        .char-counter { text-align: right; margin-top: -10px; margin-bottom: 10px; font-size: 0.75rem; color: #888; font-weight: bold; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: var(--black); padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 1000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        a { color: var(--yellow); text-decoration: underline; }
    </style>
</head>
<body>

    <div id="toast">Odkaz zkopírován! 🚀</div>

    <h1>⚡ ROZHODNI O NOVÉ EDICI ⚡</h1>

    <div id="userInfoSection" class="user-info-section">
        <input type="email" id="userEmail" placeholder="Tvůj e-mail (abychom věděli, komu poslat výhru)*">
        <input type="text" id="userName" placeholder="Tvé jméno nebo přezdívka">
        <label style="font-size: 0.8rem; display: block; margin-bottom: 15px; cursor: pointer;">
            <input type="checkbox" id="marketingConsent"> Chci vědět, až tahle zvrhlost vyjde a souhlasím se <a href="https://www.dickobraz.cz/podminky-ochrany-osobnich-udaju" target="_blank">zpracováním údajů.</a>
        </label>
        <button onclick="saveUser()" class="submit-btn">POTVRDIT A ZAČÍT SYPAT NÁVRHY</button>
    </div>

    <div id="welcomeBack" class="user-welcome hidden" style="text-align:center;">
        <p id="suggestionText"></p>
    </div>

    <div id="suggestionForm" class="add-suggestion hidden">
        <div class="promo-box">
            <h4>🔥 KARTY S NEJVÍCE HLASY REÁLNĚ VYDÁME!</h4>
            <p>Autoři vítězných karet dostanou novou edici ZDARMA a všichni zúčastnění získají 15% slevu na předprodej.</p>
        </div>

        <h3>💡 NAVRHNI VLASTNÍ KARTU</h3>
        <select id="newType">
            <option value="otázka">Typ: OTÁZKA (Žlutá karta)</option>
            <option value="odpověď">Typ: ODPOVĚĎ (Bílá karta)</option>
        </select>
        <input type="text" id="newTitle" maxlength="120" oninput="updateCharCount(this)" placeholder="Napiš sem něco, za co se budeš zítra stydět...">
        <div class="char-counter" id="charCount">0/120</div>
        <button id="submitSuggestionBtn" onclick="suggestCard()" class="submit-btn">ODESLAT NÁVRH</button>
    </div>

    <div class="controls">
        <div class="filter-group" id="filterGroup">
            <button class="active" onclick="setFilter('vše', this)">VŠE</button>
            <button onclick="setFilter('otázka', this)">OTÁZKY</button>
            <button onclick="setFilter('odpověď', this)">ODPOVĚDI</button>
        </div>
        <div class="sort-group">
            <select id="sortSelect" onchange="fetchCards()">
                <option value="newest">Nejnovější pecky</option>
                <option value="popular">To nejlepší (podle hlasů)</option>
            </select>
        </div>
    </div>

    <div id="cardsList"></div>

    <script>
        const SUPABASE_URL = 'https://lixnqbjlozrqceixmbft.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentFilter = 'vše';

        // Univerzální funkce pro skloňování
        function getDeclension(n, [one, few, many]) {
            n = Math.abs(n);
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return few;
            return many;
        }

        function updateCharCount(el) {
            document.getElementById('charCount').innerText = `${el.value.length}/120`;
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('#filterGroup button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchCards();
        }

        async function fetchCards() {
            const sortBy = document.getElementById('sortSelect').value;
            const userEmail = localStorage.getItem('userEmail');
            const urlParams = new URLSearchParams(window.location.search);
            const highlightId = urlParams.get('cardId');

            // Načtení dat (v reálné verzi doporučuji View v Postgresu pro spojení s hlasy)
            let query = _supabase.from('cards').select('*');
            if (currentFilter !== 'vše') query = query.eq('card_type', currentFilter);
            
            const { data: cards, error: err1 } = await query;
            const { data: voteCounts, error: err2 } = await _supabase.from('card_votes_count').select('*');

            if (err1 || err2) {
                console.error("Chyba při načítání:", err1 || err2);
                return;
            }

            let userVotes = [];
            if (userEmail) {
                const { data: votes } = await _supabase.from('votes').select('card_id').eq('user_email', userEmail);
                userVotes = votes ? votes.map(v => v.card_id) : [];
            }

            let cardsWithVotes = cards.map(card => ({
                ...card,
                totalVotes: voteCounts?.find(v => v.card_id === card.id)?.total_votes || 0,
                hasVoted: userVotes.includes(card.id)
            }));

            // Řazení: Pokud máme highlightId, musí být první
            if (sortBy === 'popular') {
                cardsWithVotes.sort((a, b) => b.totalVotes - a.totalVotes);
            } else {
                cardsWithVotes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }

            if (highlightId) {
                const hIdx = cardsWithVotes.findIndex(c => c.id == highlightId);
                if (hIdx > -1) {
                    const [hCard] = cardsWithVotes.splice(hIdx, 1);
                    cardsWithVotes.unshift(hCard);
                }
            }

            const container = document.getElementById('cardsList');
            container.innerHTML = '';

            cardsWithVotes.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card card-${card.card_type || 'otázka'}`;
                if (card.id == highlightId) cardDiv.classList.add('card-highlight');
                
                const hlasSlovo = getDeclension(card.totalVotes, ['HLAS', 'HLASY', 'HLASŮ']);
                
                let footerContent = `
                    <div class="btn-group">
                        <button class="btn-vote" id="vote-btn-${card.id}" onclick="handleVote('${card.id}')">HLASOVAT</button>
                        <button class="btn-share" onclick="shareCard('${card.id}', '${card.title.replace(/'/g, "\\'")}')" title="Sdílet kartu">🔗</button>
                    </div>`;
                
                if (card.hasVoted) {
                    footerContent = `<div class="btn-group"><button class="btn-vote btn-voted" disabled>✅ MÁŠ ODHLASOVÁNO</button></div>`;
                }

                cardDiv.innerHTML = `
                    <button class="report-btn" onclick="reportCard('${card.id}')" title="Nahlásit tuhle hovadinu">🚩</button>
                    <div class="vote-count">${card.totalVotes} ${hlasSlovo}</div>
                    <h3>${card.title}</h3>
                    <div class="card-footer">
                        ${footerContent}
                        <span class="brand-subtext">DICKOBRAZ: KARTY BEZ CENZURY</span>
                    </div>
                `;
                container.appendChild(cardDiv);
            });
        }

        function reportCard(id) {
            alert("Díky! Pokud je to fakt přes čáru, tak to smažeme. Ale pamatuj, tohle není hra pro citlivky.");
        }

        async function shareCard(id, title) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?cardId=${id}`;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Hlasuj pro moji kartu v Dickobrazu!', text: title, url: shareUrl });
                } catch (err) {}
            } else {
                navigator.clipboard.writeText(shareUrl);
                showToast("Odkaz na tuhle perlu zkopírován! 🚀");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        function saveUser() {
            const email = document.getElementById('userEmail').value;
            const consent = document.getElementById('marketingConsent').checked;
            if (!email || !email.includes('@')) { alert("Bez e-mailu tě do klubu nepustíme."); return; }
            if (!consent) { alert("Musíš souhlasit s těmi právnickými kecy dole."); return; }
            
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userName', document.getElementById('userName').value || 'legendární pařmene');
            localStorage.setItem('suggestionsCount', localStorage.getItem('suggestionsCount') || '0');
            checkUser();
            fetchCards();
        }

        function checkUser() {
            const email = localStorage.getItem('userEmail');
            if (email) {
                document.getElementById('userInfoSection').classList.add('hidden');
                document.getElementById('welcomeBack').classList.remove('hidden');
                document.getElementById('suggestionForm').classList.remove('hidden');
                updateSuggestionCountDisplay();
            }
        }

        function updateSuggestionCountDisplay() {
            const count = parseInt(localStorage.getItem('suggestionsCount') || '0');
            const limit = 3;
            const remaining = limit - count;
            const name = localStorage.getItem('userName');
            const textEl = document.getElementById('suggestionText');
            
            if (remaining <= 0) {
                textEl.innerHTML = `Čau <span style="color:var(--yellow)">${name}</span>! Své 3 návrhy jsi už vyplýtval. Teď už jen sleduj, jak dopadnou.`;
                const btn = document.getElementById('submitSuggestionBtn');
                btn.disabled = true;
                btn.innerText = 'LIMIT VYČERPÁN';
            } else {
                const nSlovo = getDeclension(remaining, ['návrh', 'návrhy', 'návrhů']);
                const zSlovo = getDeclension(remaining, ['Zbývá', 'Zbývají', 'Zbývá']);
                textEl.innerHTML = `Zdar <span style="color:var(--yellow)">${name}</span>! ${zSlovo} ti ještě <span style="color:var(--yellow)">${remaining}</span> ${nSlovo}. Koukej se snažit!`;
            }
        }

        async function handleVote(cardId) {
            const email = localStorage.getItem('userEmail');
            if (!email) { 
                alert("Nejdřív nám řekni, kdo jsi (vyplň e-mail nahoře)!"); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return; 
            }
            
            const btn = document.getElementById(`vote-btn-${cardId}`);
            btn.disabled = true;
            btn.innerText = "SČÍTÁM...";

            const { error } = await _supabase.from('votes').insert([{
                card_id: cardId, 
                user_email: email, 
                user_name: localStorage.getItem('userName'), 
                marketing_consent: true
            }]);

            if (error) {
                if (error.code === '23505') alert("Dvakrát pro jednu kartu hlasovat nemůžeš. Nejsme v komunálních volbách.");
                else alert('Chyba: ' + error.message);
                btn.disabled = false;
                btn.innerText = "HLASOVAT";
            } else {
                fetchCards();
            }
        }

        async function suggestCard() {
            const count = parseInt(localStorage.getItem('suggestionsCount') || '0');
            if (count >= 3) {
                alert("Limit vyčerpán. Zkus poprosit mámu, ať ti půjčí e-mail.");
                return;
            }

            const title = document.getElementById('newTitle').value.trim();
            if (title.length < 5) {
                alert("Tvoje fantazie je očividně na dovolené. Zkus napsat něco víc než dvě slova.");
                return;
            }

            const btn = document.getElementById('submitSuggestionBtn');
            btn.disabled = true;
            btn.innerText = "POSÍLÁM DO TISKÁRNY...";

            const { error } = await _supabase.from('cards').insert([{
                title: title, 
                card_type: document.getElementById('newType').value, 
                is_official: false
            }]);

            if (!error) {
                localStorage.setItem('suggestionsCount', (count + 1).toString());
                document.getElementById('newTitle').value = '';
                updateCharCount(document.getElementById('newTitle'));
                updateSuggestionCountDisplay();
                fetchCards();
                showToast("Návrh odeslán! Snad to projde cenzurou... 😈");
            } else {
                alert("Něco se podělalo. Asi to dělal stejnej brigádník jako minule.");
            }
            btn.disabled = false;
            btn.innerText = "ODESLAT NÁVRH";
        }

        window.onload = () => {
            checkUser();
            fetchCards();
        };
    </script>
</body>
</html>
