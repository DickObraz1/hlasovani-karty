<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlasování o nových kartách | Dickobraz</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #fbda18; --black: #000000; --white: #ffffff; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: var(--black); color: var(--white); -webkit-font-smoothing: antialiased; }
        
        h1 { text-align: center; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-weight: 900; }
        
        .user-info-section { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--yellow); margin-bottom: 30px; }
        .hidden { display: none; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .filter-group button { background: #333; color: white; border: 1px solid var(--yellow); padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .filter-group button.active { background: var(--yellow); color: var(--black); }
        .sort-group select { background: #333; color: white; border: 1px solid var(--yellow); padding: 8px; border-radius: 5px; }

        #cardsList { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .card { 
            aspect-ratio: 2.5/3.5; 
            padding: 20px; 
            border-radius: 14px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            color: var(--black); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            position: relative; 
            border: 4px solid transparent;
            box-sizing: border-box;
        }
        .card-otázka { background: var(--yellow); border-color: var(--black); }
        .card-odpověď { background: var(--white); border-color: var(--yellow); }
        
        .card h3 { 
            margin: 0; 
            font-size: 1.3rem; 
            line-height: 1.25; 
            text-align: left; 
            font-weight: bold;
            word-wrap: break-word;
            padding-top: 5px;
        }
        
        .vote-count { position: absolute; top: 12px; right: 15px; font-size: 0.7rem; font-weight: 900; opacity: 0.6; }
        
        .card-footer { margin-top: auto; padding-top: 15px; text-align: center; }
        
        .btn-vote { width: 100%; background: var(--black); color: var(--white); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .card-otázka .btn-vote { color: var(--yellow); }
        .card-odpověď .btn-vote { background: var(--yellow); color: var(--black); }

        .brand-subtext { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 900; margin-top: 8px; display: block; }
        
        input, select, button.submit-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        .submit-btn { background: var(--yellow); color: var(--black); font-weight: bold; text-transform: uppercase; cursor: pointer; border: 2px solid var(--black); }
        .submit-btn:disabled { background: #555; color: #888; border-color: #444; cursor: not-allowed; }
        
        .add-suggestion { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 3px dashed var(--yellow); margin-top: 50px; }
        
        a { color: var(--yellow); }
    </style>
</head>
<body>

    <h1>⚡ ROZHODNI O NOVÉ EDICI ⚡</h1>

    <div id="userInfoSection" class="user-info-section">
        <input type="email" id="userEmail" placeholder="Tvůj e-mail*">
        <input type="text" id="userName" placeholder="Tvé jméno (dobrovolné)">
        <label style="font-size: 0.8rem; display: block; margin-bottom: 10px;">
            <input type="checkbox" id="marketingConsent"> Chci vědět, až rozšíření vyjde a souhlasím se <a href="https://www.dickobraz.cz/podminky-ochrany-osobnich-udaju" target="_blank">zpracováním osobních údajů.</a>
        </label>
        <button onclick="saveUser()" class="submit-btn">POTVRDIT A ZAČÍT</button>
    </div>

    <div id="welcomeBack" class="user-welcome hidden" style="text-align:center; margin-bottom:20px;">
        <p>Ahoj <span id="displayUserName" style="color:var(--yellow)"></span>! Zbývá ti <span id="remainingSuggestions" style="color:var(--yellow)">3</span> návrhy.</p>
    </div>

    <div class="controls">
        <div class="filter-group" id="filterGroup">
            <button class="active" onclick="setFilter('vše', this)">VŠE</button>
            <button onclick="setFilter('otázka', this)">OTÁZKY</button>
            <button onclick="setFilter('odpověď', this)">ODPOVĚDI</button>
        </div>
        <div class="sort-group">
            <select id="sortSelect" onchange="fetchCards()">
                <option value="newest">Od nejnovějších</option>
                <option value="popular">Podle hlasů</option>
            </select>
        </div>
    </div>

    <div id="cardsList"></div>

    <div id="suggestionForm" class="add-suggestion hidden">
        <h3>💡 NAVRHNI VLASTNÍ KARTU</h3>
        <select id="newType">
            <option value="otázka">Typ: OTÁZKA (Žlutá)</option>
            <option value="odpověď">Typ: ODPOVĚĎ (Bílá)</option>
        </select>
        <input type="text" id="newTitle" placeholder="Text na kartě...">
        <button id="submitSuggestionBtn" onclick="suggestCard()" class="submit-btn">ODESLAT NÁVRH</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://lixnqbjlozrqceixmbft.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentFilter = 'vše';

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('#filterGroup button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchCards();
        }

        async function fetchCards() {
            const sortBy = document.getElementById('sortSelect').value;
            let query = _supabase.from('cards').select('*');
            if (currentFilter !== 'vše') query = query.eq('card_type', currentFilter);
            
            const { data: cards } = await query;
            const { data: voteCounts } = await _supabase.from('card_votes_count').select('*');

            let cardsWithVotes = cards.map(card => ({
                ...card,
                votes: voteCounts?.find(v => v.card_id === card.id)?.total_votes || 0
            }));

            if (sortBy === 'popular') cardsWithVotes.sort((a, b) => b.votes - a.votes);
            else cardsWithVotes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const container = document.getElementById('cardsList');
            container.innerHTML = '';

            cardsWithVotes.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card card-${card.card_type || 'otázka'}`;
                cardDiv.innerHTML = `
                    <div class="vote-count">${card.votes} HLASŮ</div>
                    <h3>${card.title}</h3>
                    <div class="card-footer">
                        <button class="btn-vote" onclick="handleVote('${card.id}')">HLASOVAT</button>
                        <span class="brand-subtext">KARTY BEZ CENZURY</span>
                    </div>
                `;
                container.appendChild(cardDiv);
            });
        }

        function saveUser() {
            const email = document.getElementById('userEmail').value;
            const consent = document.getElementById('marketingConsent').checked;
            if (!email || !consent) { alert("Email a souhlas jsou povinné!"); return; }
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userName', document.getElementById('userName').value || 'pařmene');
            if(!localStorage.getItem('suggestionsCount')) localStorage.setItem('suggestionsCount', '0');
            checkUser();
        }

        function checkUser() {
            const email = localStorage.getItem('userEmail');
            if (email) {
                document.getElementById('userInfoSection').classList.add('hidden');
                document.getElementById('welcomeBack').classList.remove('hidden');
                document.getElementById('suggestionForm').classList.remove('hidden');
                document.getElementById('displayUserName').innerText = localStorage.getItem('userName');
                updateSuggestionCountDisplay();
            }
        }

        function updateSuggestionCountDisplay() {
            const count = parseInt(localStorage.getItem('suggestionsCount') || '0');
            const remaining = Math.max(0, 3 - count);
            document.getElementById('remainingSuggestions').innerText = remaining;
            
            if (count >= 3) {
                const btn = document.getElementById('submitSuggestionBtn');
                btn.style.background = '#555';
                btn.style.color = '#888';
                btn.innerText = 'LIMIT VYČERPÁN';
            }
        }

        async function handleVote(cardId) {
            const email = localStorage.getItem('userEmail');
            if (!email) { alert("Nejdřív vyplň údaje!"); return; }
            const { error } = await _supabase.from('votes').insert([{
                card_id: cardId, user_email: email, user_name: localStorage.getItem('userName'), marketing_consent: true
            }]);
            if (error) alert(error.code === '23505' ? 'Už jsi hlasoval!' : 'Chyba: ' + error.message);
            else { alert('Hlas přijat!'); fetchCards(); }
        }

        async function suggestCard() {
            const count = parseInt(localStorage.getItem('suggestionsCount') || '0');
            
            // TADY JE TA HLÁŠKA
            if (count >= 3) {
                alert("Tvůj limit pro návrhy je vyčerpán, zkus požádat tvojí mámu, aby vyplnila další návrhy za tebe.");
                return;
            }

            const title = document.getElementById('newTitle').value;
            if (!title) { alert("Napiš nejdřív text karty!"); return; }

            const { error } = await _supabase.from('cards').insert([{
                title: title, card_type: document.getElementById('newType').value, is_official: false
            }]);

            if (!error) {
                localStorage.setItem('suggestionsCount', (count + 1).toString());
                document.getElementById('newTitle').value = '';
                updateSuggestionCountDisplay();
                alert('Návrh odeslán! Úspěšně jsi Dickobrazovi zavařil mozek.');
                fetchCards();
            }
        }

        checkUser();
        fetchCards();
    </script>
</body>
</html>
