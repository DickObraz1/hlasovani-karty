<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlasování o nových kartách</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #fbda18; --black: #000000; --white: #ffffff; }
        body { font-family: 'Arial Black', Gadget, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: var(--black); color: var(--white); }
        
        h1, h2 { text-align: center; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; }
        
        .user-info-section { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--yellow); margin-bottom: 40px; }
        
        /* Grid pro kartičky */
        #cardsList { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card { 
            aspect-ratio: 2.5/3.5; /* Poměr klasické karty */
            padding: 25px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            color: var(--black);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            position: relative;
        }
        .card:hover { transform: scale(1.05) rotate(1deg); }
        
        /* Barevnost podle typu */
        .card-otázka { background: var(--yellow); border: 4px solid var(--black); }
        .card-odpověď { background: var(--white); border: 4px solid var(--yellow); }
        
        .card h3 { margin: 0; font-size: 1.4rem; line-height: 1.2; }
        .card p { font-size: 0.9rem; margin-top: 10px; font-weight: bold; }
        
        .vote-btn-container { margin-top: auto; padding-top: 20px; }
        .btn-vote { width: 100%; background: var(--black); color: var(--white); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .card-otázka .btn-vote { background: var(--black); color: var(--yellow); }
        .card-odpověď .btn-vote { background: var(--yellow); color: var(--black); }

        input, select, button.submit-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        .submit-btn { background: var(--yellow); color: var(--black); font-weight: bold; text-transform: uppercase; cursor: pointer; }
        
        .add-suggestion { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 3px dashed var(--yellow); margin-top: 50px; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>⚡ Rozhodni o nové edici ⚡</h1>

    <div class="user-info-section">
        <input type="email" id="userEmail" placeholder="Tvůj e-mail (nutné pro hlasování)*">
        <input type="text" id="userName" placeholder="Tvé jméno (dobrovolné)">
        <label>
            <input type="checkbox" id="marketingConsent"> Chci vědět, až karty vyjdou (+ marketingový souhlas)
        </label>
    </div>

    <h2>Aktuální návrhy</h2>
    <div id="cardsList">
        </div>

    <div class="add-suggestion">
        <h3>💡 Navrhni vlastní kartu</h3>
        <select id="newType">
            <option value="otázka">Typ: OTÁZKA (Žlutá)</option>
            <option value="odpověď">Typ: ODPOVĚĎ (Bílá)</option>
        </select>
        <input type="text" id="newTitle" placeholder="Text na kartě (např. Co smrdí víc než...?)">
        <input type="text" id="newDesc" placeholder="Doplňující text (volitelné)">
        <button onclick="suggestCard()" class="submit-btn">Odeslat můj návrh</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://lixnqbjlozrqceixmbft.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchCards() {
            const { data, error } = await _supabase.from('cards').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('cardsList');
            container.innerHTML = '';

            if (data) {
                data.forEach(card => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = `card card-${card.card_type || 'otázka'}`;
                    cardDiv.innerHTML = `
                        <div>
                            <h3>${card.title}</h3>
                            <p>${card.description || ''}</p>
                        </div>
                        <div class="vote-btn-container">
                            <button class="btn-vote" onclick="handleVote('${card.id}')">Hlasovat</button>
                        </div>
                    `;
                    container.appendChild(cardDiv);
                });
            }
        }

        async function handleVote(cardId) {
            const email = document.getElementById('userEmail').value;
            const consent = document.getElementById('marketingConsent').checked;
            if (!email || !consent) { alert("Zadej e-mail a zaškrtni souhlas!"); return; }

            const { error } = await _supabase.from('votes').insert([{
                card_id: cardId, user_email: email, user_name: document.getElementById('userName').value, marketing_consent: consent
            }]);

            if (error) {
                alert(error.code === '23505' ? 'Už jsi hlasoval!' : 'Chyba: ' + error.message);
            } else {
                alert('Díky za hlas!');
            }
        }

        async function suggestCard() {
            const email = document.getElementById('userEmail').value;
            const consent = document.getElementById('marketingConsent').checked;
            if (!email || !consent) { alert("Před návrhem zadej e-mail a souhlas!"); return; }

            const title = document.getElementById('newTitle').value;
            const type = document.getElementById('newType').value;
            if (!title) return;

            const { error } = await _supabase.from('cards').insert([{
                title: title, description: document.getElementById('newDesc').value, card_type: type, is_official: false
            }]);

            if (!error) {
                alert('Návrh odeslán!');
                document.getElementById('newTitle').value = '';
                fetchCards();
            }
        }

        fetchCards();
    </script>
</body>
</html>
