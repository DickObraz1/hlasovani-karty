<style>
    /* ... předchozí styly ... */
    .admin-controls { background: #222; padding: 15px; border-radius: 10px; margin-top: 50px; border: 1px solid #444; text-align: center; }
    .admin-btn-group { display: flex; gap: 5px; margin-top: 10px; }
    .btn-admin-del { background: #ff4444; color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 0.7rem; }
    .btn-admin-ok { background: #00ff00; color: black; border: none; padding: 5px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 0.7rem; }
    .official-badge { background: #00ff00; color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; position: absolute; bottom: 65px; left: 15px; font-weight: bold; }
</style>

<div id="cardsList"></div>

    <div class="admin-controls">
        <p style="font-size: 0.7rem; color: #666;">ADMIN SEKCE</p>
        <input type="password" id="adminKey" placeholder="Master Key" style="width: 200px; margin-bottom: 0; padding: 5px;" oninput="fetchCards()">
    </div>

    <script>
        const SUPABASE_URL = 'https://lixnqbjlozrqceixmbft.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP'; 
        const ADMIN_PASSWORD = 'dikobraz2024'; // TADY SI ZMĚŇ HESLO
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ... (funkce getDeclension, updateCharCount, setFilter zůstávají stejné) ...

        async function fetchCards() {
            const sortBy = document.getElementById('sortSelect').value;
            const userEmail = localStorage.getItem('userEmail');
            const urlParams = new URLSearchParams(window.location.search);
            const highlightId = urlParams.get('cardId');
            const isAdmin = document.getElementById('adminKey').value === ADMIN_PASSWORD;

            let query = _supabase.from('cards').select('*');
            if (currentFilter !== 'vše') query = query.eq('card_type', currentFilter);
            
            const { data: cards } = await query;
            const { data: voteCounts } = await _supabase.from('card_votes_count').select('*');

            let userVotes = [];
            if (userEmail) {
                const { data: votes } = await _supabase.from('votes').select('card_id').eq('user_email', userEmail);
                userVotes = votes ? votes.map(v => v.card_id) : [];
            }

            let cardsWithVotes = cards.map(card => ({
                ...card,
                totalVotes: voteCounts?.find(v => v.card_id === card.id)?.total_votes || 0,
                hasVoted: userVotes.includes(card.id)
            }));

            // Řazení
            if (sortBy === 'popular') cardsWithVotes.sort((a, b) => b.totalVotes - a.totalVotes);
            else cardsWithVotes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Highlight priority
            if (highlightId) {
                const hIdx = cardsWithVotes.findIndex(c => c.id == highlightId);
                if (hIdx > -1) {
                    const [hCard] = cardsWithVotes.splice(hIdx, 1);
                    cardsWithVotes.unshift(hCard);
                }
            }

            const container = document.getElementById('cardsList');
            container.innerHTML = '';

            cardsWithVotes.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card card-${card.card_type || 'otázka'}`;
                if (card.id == highlightId) cardDiv.classList.add('card-highlight');
                
                const hlasSlovo = getDeclension(card.totalVotes, ['HLAS', 'HLASY', 'HLASŮ']);
                
                // Admin tlačítka
                let adminHtml = '';
                if (isAdmin) {
                    adminHtml = `
                        <div class="admin-btn-group">
                            <button class="btn-admin-ok" onclick="adminApprove('${card.id}')">SCHVÁLIT</button>
                            <button class="btn-admin-del" onclick="adminDelete('${card.id}')">SMAZAT</button>
                        </div>
                    `;
                }

                cardDiv.innerHTML = `
                    <button class="report-btn" onclick="reportCard('${card.id}')">🚩</button>
                    <div class="vote-count">${card.totalVotes} ${hlasSlovo}</div>
                    ${card.is_official ? '<span class="official-badge">OFICIÁLNÍ VÝBĚR</span>' : ''}
                    <h3>${card.title}</h3>
                    <div class="card-footer">
                        <div class="btn-group">
                            ${card.hasVoted 
                                ? '<button class="btn-vote btn-voted" disabled>✅ HLASOVÁNO</button>' 
                                : `<button class="btn-vote" id="vote-btn-${card.id}" onclick="handleVote('${card.id}')">HLASOVAT</button>`
                            }
                            <button class="btn-share" onclick="shareCard('${card.id}', '${card.title.replace(/'/g, "\\'")}')">🔗</button>
                        </div>
                        ${adminHtml}
                        <span class="brand-subtext">DICKOBRAZ</span>
                    </div>
                `;
                container.appendChild(cardDiv);
            });
        }

        // --- ADMIN FUNKCE ---
        async function adminDelete(id) {
            if (!confirm("Fakt tuhle kartu smažeš? Nejde to vrátit!")) return;
            const { error } = await _supabase.from('cards').delete().eq('id', id);
            if (error) alert("Chyba: " + error.message);
            else fetchCards();
        }

        async function adminApprove(id) {
            const { error } = await _supabase.from('cards').update({ is_official: true }).eq('id', id);
            if (error) alert("Chyba: " + error.message);
            else fetchCards();
        }

        // ... (zbytek funkcí jako saveUser, handleVote, atd. zůstává stejný jako minule) ...
    </script>
