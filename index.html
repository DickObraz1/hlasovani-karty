<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlasování o nových kartách</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); }
        h1, h2 { text-align: center; color: #0f172a; }
        
        .user-info-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 30px; border: 2px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); border-left: 5px solid var(--primary); }
        .card-info h3 { margin: 0; font-size: 1.2rem; }
        .card-info p { margin: 5px 0 0; color: #64748b; font-size: 0.9rem; }
        
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; }
        input[type="checkbox"] { width: auto; margin-right: 10px; }
        button { cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-vote { background: var(--primary); color: white; border: none; min-width: 120px; }
        .btn-vote:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-vote:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .add-suggestion { margin-top: 40px; padding: 25px; background: #eff6ff; border-radius: 12px; border: 2px dashed #bfdbfe; }
        .full-width { width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🃏 Rozhodni o nové kolekci</h1>
    <p style="text-align: center;">Hlasuj pro své favority nebo navrhni vlastní kartu!</p>

    <div class="user-info-section">
        <h3>1. Nejdřív se nám představ</h3>
        <div class="grid">
            <input type="email" id="userEmail" placeholder="Tvůj e-mail (povinné)*">
            <input type="text" id="userName" placeholder="Tvé jméno (dobrovolné)">
        </div>
        <label style="font-size: 0.85rem; color: #475569; display: flex; align-items: center;">
            <input type="checkbox" id="marketingConsent"> Chci dostat info, až karty vyjdou (souhlas se zpracováním) *
        </label>
    </div>

    <div id="cardsList">
        <h2>Aktuální návrhy</h2>
        <div id="loading">Načítám karty ze světa...</div>
    </div>

    <div class="add-suggestion">
        <h3>💡 Máš lepší nápad? Navrhni kartu!</h3>
        <input type="text" id="newTitle" class="full-width" placeholder="Název karty (např. Ohnivý fénix)">
        <input type="text" id="newDesc" class="full-width" placeholder="Krátký popis, co karta umí...">
        <button onclick="suggestCard()" style="width: 100%; background: #059669; color: white; border: none;">Odeslat můj návrh</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://lixnqbjlozrqceixmbft.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Funkce pro načtení karet
        async function fetchCards() {
            const { data, error } = await _supabase
                .from('cards')
                .select('*')
                .order('created_at', { ascending: false });

            const container = document.getElementById('cardsList');
            const loading = document.getElementById('loading');
            if (loading) loading.remove();

            if (data) {
                // Nejdřív vymažeme starý seznam (kromě nadpisu)
                const existingCards = container.querySelectorAll('.card');
                existingCards.forEach(c => c.remove());

                data.forEach(card => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';
                    cardDiv.innerHTML = `
                        <div class="card-info">
                            <h3>${card.title} ${card.is_official ? '⭐' : '👤'}</h3>
                            <p>${card.description || ''}</p>
                        </div>
                        <button class="btn-vote" onclick="handleVote('${card.id}')">Hlasovat</button>
                    `;
                    container.appendChild(cardDiv);
                });
            }
        }

        // Pomocná funkce pro kontrolu údajů
        function getUserData() {
            const email = document.getElementById('userEmail').value;
            const name = document.getElementById('userName').value;
            const consent = document.getElementById('marketingConsent').checked;

            if (!email || !consent) {
                alert("Prosím vyplň e-mail a zaškrtni souhlas, abychom věděli, kam ti poslat výhru nebo info o vydání!");
                return null;
            }
            return { email, name, consent };
        }

        // Hlasování
        async function handleVote(cardId) {
            const user = getUserData();
            if (!user) return;

            const { error } = await _supabase.from('votes').insert([{
                card_id: cardId,
                user_email: user.email,
                user_name: user.name,
                marketing_consent: user.consent
            }]);

            if (error) {
                if (error.code === '23505') alert('Pro tuhle kartu už jsi hlasoval.');
                else alert('Chyba: ' + error.message);
            } else {
                alert('Díky! Tvůj hlas byl započítán.');
            }
        }

        // Přidání nové karty
        async function suggestCard() {
            const user = getUserData();
            if (!user) return;

            const title = document.getElementById('newTitle').value;
            const desc = document.getElementById('newDesc').value;

            if (!title) { alert('Karta musí mít název!'); return; }

            const { error } = await _supabase.from('cards').insert([{
                title: title,
                description: desc,
                is_official: false
            }]);

            if (error) {
                alert('Chyba při odesílání: ' + error.message);
            } else {
                alert('Tvůj návrh byl přidán do seznamu!');
                document.getElementById('newTitle').value = '';
                document.getElementById('newDesc').value = '';
                fetchCards(); // Obnovíme seznam
            }
        }

        // Spustit načítání při startu
        fetchCards();
    </script>
</body>
</html>
