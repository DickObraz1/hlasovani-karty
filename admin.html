<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Dickobraz</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .admin-box { background: #111; padding: 20px; border-radius: 10px; border: 2px solid #fbda18; margin-bottom: 20px; text-align: center; }
        .card-row { background: #222; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        .card-row.is-official { border-left-color: #00ff00; }
        .btn-del { background: #ff4444; border: none; color: white; padding: 8px; cursor: pointer; border-radius: 5px; margin-left: 5px; }
        .btn-ok { background: #00ff00; border: none; color: black; padding: 8px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .info { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .email-tag { color: #fbda18; font-weight: bold; }
        input[type="password"] { background: #222; color: #fff; border: 1px solid #fbda18; padding: 10px; border-radius: 5px; width: 250px; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>DICKOBRAZ ADMIN PULT</h2>
        <input type="password" id="pass" placeholder="Zadej Master Key" oninput="loadAdmin()">
    </div>

    <div id="adminList"></div>

    <script>
        const _supabase = supabase.createClient('https://lixnqbjlozrqceixmbft.supabase.co', 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP');
        
        async function loadAdmin() {
            // Kontrola hesla (v ostrém provozu tohle řeší RLS, ale pro začátek to stačí)
            if (document.getElementById('pass').value !== 'dikobraz2024') return;
            
            const { data: cards, error } = await _supabase
                .from('cards')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { console.error(error); return; }

            const list = document.getElementById('adminList');
            list.innerHTML = '';

            cards.forEach(card => {
                const row = document.createElement('div');
                row.className = `card-row ${card.is_official ? 'is-official' : ''}`;
                
                // Pokud e-mail chybí (u starých karet), vypíšeme "Neznámý"
                const authorEmail = card.user_email || "Neznámý autor";

                row.innerHTML = `
                    <div style="flex: 1;">
                        <div style="font-size: 1.1rem; margin-bottom: 4px;"><strong>${card.title}</strong></div>
                        <div class="info">
                            Typ: ${card.card_type.toUpperCase()} | 
                            Autor: <span class="email-tag">${authorEmail}</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        ${!card.is_official ? `<button class="btn-ok" onclick="approve('${card.id}')">SCHVÁLIT</button>` : '<span style="color:#00ff00; font-weight:bold; padding: 8px;">✅ SCHVÁLENO</span>'}
                        <button class="btn-del" onclick="remove('${card.id}')">SMAZAT</button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        async function approve(id) {
            const { error } = await _supabase.from('cards').update({ is_official: true }).eq('id', id);
            if (!error) loadAdmin();
            else alert("Chyba při schvalování.");
        }

        async function remove(id) {
            if (confirm('Vážně chceš tuhle kartu smazat z povrchu zemského?')) {
                const { error } = await _supabase.from('cards').delete().eq('id', id);
                if (!error) loadAdmin();
                else alert("Chyba při mazání.");
            }
        }
    </script>
</body>
</html>
