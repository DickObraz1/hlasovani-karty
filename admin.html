<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Dickobraz</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .admin-box { background: #111; padding: 20px; border-radius: 10px; border: 2px solid #fbda18; margin-bottom: 20px; text-align: center; }
        .card-row { background: #222; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        .card-row.is-official { border-left-color: #00ff00; }
        .btn-del { background: #ff4444; border: none; color: white; padding: 8px; cursor: pointer; border-radius: 5px; margin-left: 5px; }
        .btn-ok { background: #00ff00; border: none; color: black; padding: 8px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .info { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .email-tag { color: #fbda18; font-weight: bold; }
        input[type="password"], input[type="email"] { background: #222; color: #fff; border: 1px solid #fbda18; padding: 10px; border-radius: 5px; width: 250px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        .btn-login { background: #fbda18; color: #000; border: none; padding: 10px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-logout { background: #333; color: #fff; border: 1px solid #fbda18; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="admin-box" id="loginBox">
        <h2>DICKOBRAZ ADMIN PULT</h2>
        <p style="color:#aaa; font-size:0.85rem;">Přihlas se svým admin účtem</p>
        <input type="email" id="adminEmail" placeholder="Admin e-mail">
        <input type="password" id="adminPass" placeholder="Heslo">
        <button class="btn-login" onclick="loginAdmin()">PŘIHLÁSIT SE</button>
    </div>

    <div class="admin-box" id="adminHeader" style="display:none;">
        <h2>DICKOBRAZ ADMIN PULT</h2>
        <span id="loggedInAs" style="color:#aaa; font-size:0.85rem;"></span>
        <br><br>
        <button class="btn-logout" onclick="logoutAdmin()">Odhlásit se</button>
    </div>

    <div id="adminList"></div>

    <script>
        const _supabase = supabase.createClient('https://lixnqbjlozrqceixmbft.supabase.co', 'sb_publishable_vGycWa1bjT2riAUXTT6pNA_xjRvPHeP');

        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = String(str || '');
            return div.innerHTML;
        }

        async function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPass').value;
            if (!email || !password) { alert('Zadej e-mail a heslo.'); return; }

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error || !data.user) {
                alert('Spatne prihlasovaci udaje nebo nemas admin pristup.');
                return;
            }
            showAdminPanel(data.user.email);
        }

        async function logoutAdmin() {
            await _supabase.auth.signOut();
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminHeader').style.display = 'none';
            document.getElementById('adminList').innerHTML = '';
        }

        function showAdminPanel(email) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminHeader').style.display = 'block';
            document.getElementById('loggedInAs').textContent = 'Prihlaseno jako: ' + email;
            loadAdmin();
        }

        async function loadAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { alert('Nejsi prihlaseny.'); return; }

            const { data: cards, error } = await _supabase
                .from('cards')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { console.error(error); return; }

            const list = document.getElementById('adminList');
            list.innerHTML = '';

            cards.forEach(card => {
                const row = document.createElement('div');
                row.className = `card-row ${card.is_official ? 'is-official' : ''}`;

                const authorEmail = card.user_email || 'Neznamý autor';

                const titleEl = document.createElement('strong');
                titleEl.textContent = card.title;

                const typeEl = document.createElement('span');
                typeEl.textContent = (card.card_type || '').toUpperCase();

                const emailEl = document.createElement('span');
                emailEl.className = 'email-tag';
                emailEl.textContent = authorEmail;

                const infoDiv = document.createElement('div');
                infoDiv.className = 'info';
                infoDiv.appendChild(document.createTextNode('Typ: '));
                infoDiv.appendChild(typeEl);
                infoDiv.appendChild(document.createTextNode(' | Autor: '));
                infoDiv.appendChild(emailEl);

                const contentDiv = document.createElement('div');
                contentDiv.style.flex = '1';
                contentDiv.style.marginBottom = '4px';
                contentDiv.style.fontSize = '1.1rem';
                contentDiv.appendChild(titleEl);
                contentDiv.appendChild(infoDiv);

                const actionsDiv = document.createElement('div');
                actionsDiv.style.display = 'flex';
                actionsDiv.style.gap = '10px';

                if (!card.is_official) {
                    const approveBtn = document.createElement('button');
                    approveBtn.className = 'btn-ok';
                    approveBtn.textContent = 'SCHVALIT';
                    approveBtn.onclick = () => approve(card.id);
                    actionsDiv.appendChild(approveBtn);
                } else {
                    const doneSpan = document.createElement('span');
                    doneSpan.style.cssText = 'color:#00ff00; font-weight:bold; padding:8px;';
                    doneSpan.textContent = 'SCHVALENO';
                    actionsDiv.appendChild(doneSpan);
                }

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-del';
                delBtn.textContent = 'SMAZAT';
                delBtn.onclick = () => remove(card.id);
                actionsDiv.appendChild(delBtn);

                row.appendChild(contentDiv);
                row.appendChild(actionsDiv);
                list.appendChild(row);
            });
        }

        async function approve(id) {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { alert('Nejsi prihlaseny.'); return; }
            const { error } = await _supabase.from('cards').update({ is_official: true }).eq('id', id);
            if (!error) loadAdmin();
            else alert('Chyba pri schvalovani.');
        }

        async function remove(id) {
            if (confirm('Vazne chces tuhle kartu smazat z povrchu zemskeho?')) {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { alert('Nejsi prihlaseny.'); return; }
                const { error } = await _supabase.from('cards').delete().eq('id', id);
                if (!error) loadAdmin();
                else alert('Chyba pri mazani.');
            }
        }

        // Obnov session pri nacteni stranky
        window.onload = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) showAdminPanel(user.email);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
